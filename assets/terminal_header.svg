<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ADB5" />
      <stop offset="50%" stop-color="#7928CA" />
      <stop offset="100%" stop-color="#FF0080" />
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&amp;display=swap');

    .bg { fill: #090d16; rx: 12px; stroke: url(#borderGrad); stroke-width: 2px; }
    .header-bar { fill: #121826; rx: 12px 12px 0 0; }
    .dot-red { fill: #ff5f56; }
    .dot-yellow { fill: #ffbd2e; }
    .dot-green { fill: #27c93f; }
    .title { fill: #8b949e; font-family: 'Fira Code', Consolas, monospace; font-size: 13px; font-weight: 600; }

    .text-prompt { fill: #00ADB5; font-family: 'Fira Code', Consolas, monospace; font-size: 14px; font-weight: 700; }
    .text-cmd { fill: #e6edf3; font-family: 'Fira Code', Consolas, monospace; font-size: 14px; }
    .text-output { fill: #7ee787; font-family: 'Fira Code', Consolas, monospace; font-size: 13px; }
    .text-accent { fill: #f778ba; font-family: 'Fira Code', Consolas, monospace; font-size: 13px; font-weight: 600; }
    .text-dim { fill: #8b949e; font-family: 'Fira Code', Consolas, monospace; font-size: 12px; }

    .cursor { fill: #00ADB5; animation: blink 0.9s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Cat Animation */
    .cat-eyes { animation: catBlink 4s infinite; }
    @keyframes catBlink { 0%, 90%, 100% { opacity: 1; } 93%, 95% { opacity: 0; } }
    
    .cat-tail { transform-origin: 740px 115px; animation: wagTail 2s ease-in-out infinite alternate; }
    @keyframes wagTail { 0% { transform: rotate(0deg); } 100% { transform: rotate(-15deg); } }
  </style>

  <!-- Container -->
  <rect class="bg" width="896" height="276" x="2" y="2" />
  
  <!-- Terminal Header -->
  <path d="M 2,14 A 12,12 0 0,1 14,2 L 886,2 A 12,12 0 0,1 898,14 L 898,36 L 2,36 Z" class="header-bar" />
  <circle cx="20" cy="19" r="6" class="dot-red" />
  <circle cx="40" cy="19" r="6" class="dot-yellow" />
  <circle cx="60" cy="19" r="6" class="dot-green" />
  <text x="450" y="23" text-anchor="middle" class="title">vineet-k09@bengaluru:~ (zsh)</text>

  <!-- Left Column: Terminal Prompt & Bio -->
  <g transform="translate(24, 64)">
    <text class="text-prompt" x="0" y="0">vineet@dev-machine:~$</text>
    <text class="text-cmd" x="185" y="0">./whoami --verbose</text>
    
    <text class="text-output" x="0" y="28">[+] Role:</text>
    <text class="text-cmd" x="85" y="28">Backend-Focused Software Engineer</text>
    
    <text class="text-output" x="0" y="52">[+] Focus:</text>
    <text class="text-accent" x="95" y="52">High-Throughput APIs &amp; Data Workflows</text>
    
    <text class="text-output" x="0" y="76">[+] Location:</text>
    <text class="text-cmd" x="110" y="76">Bengaluru, India 📍</text>
    
    <text class="text-output" x="0" y="100">[+] Degree:</text>
    <text class="text-cmd" x="95" y="100">B.E. CSE (Data Science) '26 | CGPA: 8.7</text>

    <text class="text-prompt" x="0" y="136">vineet@dev-machine:~$</text>
    <text class="text-cmd" x="185" y="136">cat philosophy.txt</text>
    <text class="text-dim" x="0" y="160">"Clean modular code. Optimize latency early. Build for scale."</text>
    
    <rect class="cursor" x="495" y="125" width="8" height="15" />
  </g>

  <!-- Right Column: Aligned ASCII Coding Cat -->
  <g transform="translate(595, 50)">
    <!-- Terminal Screen for Cat -->
    <rect x="0" y="5" width="275" height="200" fill="#050810" rx="8" stroke="#1f293d" stroke-width="1.5" />
    <text x="12" y="25" fill="#484f58" font-family="'Fira Code', monospace" font-size="11" font-weight="bold">&lt;-- dev_cat.sh --&gt;</text>
    
    <!-- Aligned ASCII Cat Art -->
    <g font-family="'Fira Code', Consolas, monospace" font-size="12" font-weight="bold">
      <!-- Ears & Head -->
      <text x="45" y="58" fill="#58a6ff">   /\_/\   </text>
      <!-- Eyes & Face (Using tspan for perfect inline flow) -->
      <text x="30" y="76" fill="#58a6ff">  ( <tspan class="cat-eyes" fill="#7ee787">o . o</tspan> )  <tspan fill="#f778ba" font-size="10">~ meow!</tspan></text>
      
      <!-- Body & Paws -->
      <text x="45" y="94" fill="#58a6ff">  /  v  \  </text>
      <text x="45" y="112" fill="#58a6ff"> (  | |  ) </text>
      <text x="35" y="130" fill="#58a6ff"> (=="=="==) </text>
      
      <!-- Keyboard -->
      <text x="25" y="148" fill="#8b949e" font-size="10">[⌨️  ⌨️  ⌨️  ⌨️  ⌨️]</text>
      
      <!-- Tail -->
      <g class="cat-tail">
        <path d="M 140,115 Q 165,95 170,120 T 175,135" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round" />
      </g>
    </g>
    
    <!-- Live status -->
    <text x="15" y="172" fill="#79c0ff" font-family="'Fira Code', monospace" font-size="10">> Compiling main.py...</text>
    <text x="15" y="189" fill="#7ee787" font-family="'Fira Code', monospace" font-size="10">> [OK] Latency: 122ms</text>
  </g>
</svg>
